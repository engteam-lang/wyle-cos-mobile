plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
}

// Apply Kotlin via legacy DSL so it reads from the buildscript classpath
// (1.9.24 declared in the top-level build.gradle) rather than going through
// the plugins-DSL resolver where Flutter's composite-build can intercept it.
apply plugin: 'kotlin-android'

android {
    namespace "com.wyle.wylecosapp"
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    defaultConfig {
        applicationId "com.wyle.wylecosapp"
        minSdk 24
        targetSdk 36
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    buildTypes {
        release {
            // Uses debug signing for now — add a proper keystore for production
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source "../.."
}
