// ── Why we use apply plugin instead of the plugins {} DSL for Kotlin ──────────
// Flutter's composite includeBuild (flutter_tools/gradle) contributes its own
// Kotlin classpath (1.9.x).  In Gradle 8 the composite-build classpath is visible
// to the plugins {} DSL resolver first, so id "org.jetbrains.kotlin.android"
// resolves to 1.9.x even though settings.gradle declares 2.2.0.
// The legacy  apply plugin: 'kotlin-android'  bypasses the DSL resolver and
// reads directly from the buildscript classpath, where build.gradle pins 2.2.0.
plugins {
    id "com.android.application"
    id "dev.flutter.flutter-gradle-plugin"
}

apply plugin: 'kotlin-android'

android {
    namespace "com.wyle.wylecosapp"
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
        // Hard backstop: if the toolchain still resolves to an older compiler,
        // do not abort on metadata-version mismatches from 2.2.x dependencies.
        freeCompilerArgs += ["-Xskip-metadata-version-check"]
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    defaultConfig {
        applicationId "com.wyle.wylecosapp"
        minSdk 24
        targetSdk 36
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    buildTypes {
        release {
            // Uses debug signing for now — add a proper keystore for production
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source "../.."
}
