plugins {
    id "com.android.application"
    id "org.jetbrains.kotlin.android"   // must match the ID declared in settings.gradle
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace "com.wyle.wylecosapp"
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    sourceSets {
        main.java.srcDirs += "src/main/kotlin"
    }

    defaultConfig {
        applicationId "com.wyle.wylecosapp"
        minSdk 24
        targetSdk 36
        versionCode flutter.versionCode
        versionName flutter.versionName
    }

    buildTypes {
        release {
            // Uses debug signing for now — add a proper keystore for production
            signingConfig signingConfigs.debug
            minifyEnabled false
            shrinkResources false
        }
    }
}

flutter {
    source "../.."
}
