pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }

    // ── Kotlin version lock ─────────────────────────────────────────────────
    // Flutter's plugin-loader (includeBuild) bundles its own Kotlin version.
    // resolutionStrategy.eachPlugin intercepts every plugin request — including
    // those made from within the composite build — and redirects Kotlin to 2.2.0.
    resolutionStrategy {
        eachPlugin {
            if (requested.id.id.startsWith("org.jetbrains.kotlin") ||
                requested.id.id == "kotlin-android") {
                useVersion "2.2.0"
            }
        }
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.3.0" apply false
    id "org.jetbrains.kotlin.android" version "2.2.0" apply false
}

include ":app"
