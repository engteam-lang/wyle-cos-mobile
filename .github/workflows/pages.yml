name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Pin to the same Flutter version as the Android build for consistency.
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      # Create .env using printf (same pattern as android.yml) so there is no
      # heredoc indentation and keys match what the Flutter app actually reads.
      - name: Create .env file
        run: |
          printf '%s\n' \
            "API_URL=${{ secrets.API_URL }}" \
            "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" \
            "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
            "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" \
            "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" \
            "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
            > .env

      - name: Get Flutter dependencies
        run: flutter pub get

      # Flutter 3.29+ removed --web-renderer; CanvasKit is the default renderer.
      # Do NOT pass --wasm — that switches to Skwasm which requires COOP/COEP
      # headers that GitHub Pages does not send (silent black screen).
      # --no-tree-shake-icons: prevents icon font stripping issues.
      - name: Build web
        run: |
          flutter build web \
            --release \
            --base-href /wyle-cos-mobile/ \
            --no-tree-shake-icons

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
