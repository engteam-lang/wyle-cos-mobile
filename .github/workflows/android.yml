name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevents multiple builds from clashing
concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Java 17 (required for AGP 8.x) ───────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # ── Flutter ───────────────────────────────────────────────────────────────
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      # ── Verify Flutter (shows which binary is on PATH) ────────────────────────
      - name: Verify Flutter version
        run: flutter --version

      # ── Android NDK ───────────────────────────────────────────────────────────
      # Flutter 3.29.3 uses NDK 26.3.11579264 (flutter.ndkVersion).
      # Pre-install it so Gradle doesn't have to auto-download it mid-build.
      - name: Install required Android NDK
        run: |
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            --licenses >/dev/null 2>&1 || true
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "ndk;26.3.11579264"

      # ── Create .env (Flutter dotenv reads this at runtime) ───────────────────
      - name: Create .env file
        run: |
          printf '%s\n' \
            "API_URL=${{ secrets.API_URL }}" \
            "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" \
            "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
            "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" \
            "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" \
            > .env

      # ── Dependencies ──────────────────────────────────────────────────────────
      - name: Get Flutter dependencies
        run: flutter pub get

      # ── Build ─────────────────────────────────────────────────────────────────
      # IMPORTANT: do NOT run `flutter clean` before this step.
      # `flutter clean` deletes .dart_tool/ (Flutter's incremental build-state
      # directory).  The Gradle plugin then calls `flutter --build-inputs-only`
      # internally to rebuild that state, but in some environments the flutter
      # binary it resolves to is older and doesn't recognise that flag, causing
      # an immediate exit-64 failure ("option not found").
      # In CI every run starts with a fresh workspace, so flutter clean is
      # unnecessary and harmful here.
      #
      # NOTE: --build-inputs-only is an *internal* Flutter flag used only by
      # the Gradle plugin.  Do NOT pass it on the command line — it makes Flutter
      # print build inputs then exit 0 without producing an APK.
      # Pipe through tee so the full log is saved for the error-display step.
      - name: Build release APK
        run: |
          set -o pipefail
          flutter build apk --release --no-tree-shake-icons 2>&1 \
            | tee /tmp/flutter-build.log

      # ── Show Gradle errors on failure ─────────────────────────────────────────
      - name: Show Gradle error output
        if: failure()
        run: |
          echo "=== LAST 200 LINES OF FLUTTER BUILD LOG ==="
          tail -200 /tmp/flutter-build.log 2>/dev/null || true

          echo ""
          echo "=== GRADLE STACKTRACE (assembleRelease --stacktrace) ==="
          cd android && ./gradlew assembleRelease --stacktrace --no-daemon \
            2>&1 | tail -300 || true

      # ── Upload artifact ───────────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wyle-release-apk
          path: build/app/outputs/**/*.apk
          retention-days: 30
