name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevents multiple builds from clashing
concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Java 17 (required for AGP 8.x) ───────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # ── Flutter ───────────────────────────────────────────────────────────────
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      # ── Verify Flutter (shows which binary is on PATH) ────────────────────────
      - name: Verify Flutter version
        run: flutter --version

      # ── Android SDK platform + NDK + CMake ───────────────────────────────────
      # flutter_secure_storage and flutter_tts require compileSdk 36.
      # flutter_tts uses C++ native code → needs CMake 3.22.1.
      # Pre-install all three so nothing is auto-downloaded mid-build.
      - name: Install Android SDK platform 36, NDK, and CMake
        run: |
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            --licenses >/dev/null 2>&1 || true
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-36" \
            "ndk;26.3.11579264" \
            "cmake;3.22.1"

      # ── Create .env (Flutter dotenv reads this at runtime) ───────────────────
      - name: Create .env file
        run: |
          printf '%s\n' \
            "API_URL=${{ secrets.API_URL }}" \
            "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" \
            "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
            "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" \
            "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" \
            > .env

      # ── Dependencies ──────────────────────────────────────────────────────────
      - name: Get Flutter dependencies
        run: flutter pub get

      # ── Generate app launcher icons ───────────────────────────────────────────
      - name: Generate app launcher icons
        run: dart run flutter_launcher_icons

      # ── Patch adaptive icon to add safe-zone inset ────────────────────────────
      # flutter_launcher_icons fills the 108 dp foreground canvas edge-to-edge,
      # which causes the logo to be clipped on circular / squircle launcher
      # masks.  We overwrite the anydpi-v26 adaptive-icon XMLs to reference
      # drawable/ic_launcher_foreground.xml, an <inset 15%> wrapper that pulls
      # the logo 15 % in on every side — well inside the guaranteed safe-zone.
      - name: Patch adaptive icon with safe-zone inset
        run: |
          DIR=android/app/src/main/res/mipmap-anydpi-v26
          mkdir -p "$DIR"
          for NAME in ic_launcher ic_launcher_round; do
            FILE="$DIR/${NAME}.xml"
            if [ -f "$FILE" ]; then
              printf '%s\n' \
                '<?xml version="1.0" encoding="utf-8"?>' \
                '<adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">' \
                '    <background android:drawable="@color/ic_launcher_background"/>' \
                '    <foreground android:drawable="@drawable/ic_launcher_foreground"/>' \
                '</adaptive-icon>' > "$FILE"
              echo "Patched $FILE"
            fi
          done

      # ── Build ─────────────────────────────────────────────────────────────────
      # IMPORTANT: do NOT run `flutter clean` before this step.
      # `flutter clean` deletes .dart_tool/ (Flutter's incremental build-state
      # directory).  The Gradle plugin then calls `flutter --build-inputs-only`
      # internally to rebuild that state, but in some environments the flutter
      # binary it resolves to is older and doesn't recognise that flag, causing
      # an immediate exit-64 failure ("option not found").
      # In CI every run starts with a fresh workspace, so flutter clean is
      # unnecessary and harmful here.
      #
      # NOTE: --build-inputs-only is an *internal* Flutter flag used only by
      # the Gradle plugin.  Do NOT pass it on the command line — it makes Flutter
      # print build inputs then exit 0 without producing an APK.
      # Pipe through tee so the full log is saved for the error-display step.
      # flutter build apk occasionally reports "couldn't find .apk" even when
      # Gradle succeeds because the plugin fails to redirect android/app/build/
      # → build/app/ in CI.  We catch that case: if the APK landed in the Gradle
      # default path instead, copy it to the Flutter-expected path so the upload
      # step always works.
      - name: Build release APK
        run: |
          flutter build apk --release --no-tree-shake-icons 2>&1 \
            | tee /tmp/flutter-build.log || true

          FLUTTER_APK="build/app/outputs/flutter-apk/app-release.apk"
          GRADLE_APK="android/app/build/outputs/flutter-apk/app-release.apk"

          if [ -f "$FLUTTER_APK" ]; then
            echo "✅ APK at Flutter path: $FLUTTER_APK"
          elif [ -f "$GRADLE_APK" ]; then
            echo "⚠️  APK at Gradle default path — copying to Flutter path"
            mkdir -p "$(dirname "$FLUTTER_APK")"
            cp "$GRADLE_APK" "$FLUTTER_APK"
            echo "✅ APK normalised to: $FLUTTER_APK"
          else
            echo "❌ APK not found at either location — Gradle build failed"
            tail -100 /tmp/flutter-build.log
            exit 1
          fi

      # ── Show Gradle errors on failure ─────────────────────────────────────────
      - name: Show Gradle error output
        if: failure()
        run: |
          echo "=== LAST 300 LINES OF FLUTTER BUILD LOG ==="
          tail -300 /tmp/flutter-build.log 2>/dev/null || true

          echo ""
          echo "=== APK OUTPUT SEARCH ==="
          find /home/runner/work -name "*.apk" 2>/dev/null || true

          echo ""
          echo "=== GRADLE STACKTRACE (assembleRelease --stacktrace --info) ==="
          cd android && ./gradlew assembleRelease \
            --stacktrace --info --no-daemon \
            2>&1 | grep -E "(FAILED|ERROR|Exception|error:|warning:|> Task|BUILD)" \
            | tail -400 || true

      # ── Upload artifact ───────────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wyle-release-apk
          path: build/app/outputs/**/*.apk
          retention-days: 30
