name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Java 17 is required for AGP 8.x
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'

      - name: Create .env file
        run: |
          cat > .env << 'EOF'
          EXPO_PUBLIC_API_URL=${{ secrets.API_URL || 'http://localhost:3000/api' }}
          EXPO_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          EXPO_PUBLIC_GOOGLE_CLIENT_ID_ANDROID=${{ secrets.GOOGLE_CLIENT_ID_ANDROID }}
          EXPO_PUBLIC_GOOGLE_CLIENT_ID_IOS=${{ secrets.GOOGLE_CLIENT_ID_IOS }}
          EXPO_PUBLIC_ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          EXPO_PUBLIC_OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          EXPO_PUBLIC_GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          EXPO_PUBLIC_GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          EXPO_PUBLIC_OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          PROXY_URL=${{ secrets.PROXY_URL }}
          EOF
          
      - name: Override Kotlin version
        run: echo "kotlin.version=2.2.0" >> android/gradle.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wyle-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
