name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevents multiple builds from clashing
concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Java 17 (required for AGP 8.x) ───────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      # ── Flutter ───────────────────────────────────────────────────────────────
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      # ── Android NDK ───────────────────────────────────────────────────────────
      # Flutter 3.29.3 uses NDK 27.0.12077973; GitHub runners only ship
      # 27.2.12479018 pre-installed.  When Gradle can't find the exact version
      # it tries to auto-download it — install it explicitly to avoid that race.
      - name: Install required Android NDK
        run: |
          yes | ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            --licenses >/dev/null 2>&1 || true
          ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager \
            "ndk;27.0.12077973"

      # ── Create .env (Flutter dotenv reads this at runtime) ───────────────────
      - name: Create .env file
        run: |
          printf '%s\n' \
            "API_URL=${{ secrets.API_URL }}" \
            "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" \
            "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" \
            "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" \
            "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            "OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}" \
            > .env

      # ── Dependencies ──────────────────────────────────────────────────────────
      - name: Get Flutter dependencies
        run: flutter pub get

      # ── Build ─────────────────────────────────────────────────────────────────
      # flutter clean ensures no stale build artefacts from previous runs.
      # Pipe through tee so the full log is saved for the error step below.
      - name: Build release APK
        run: |
          flutter clean
          flutter pub get
          flutter build apk --release --no-tree-shake-icons --verbose --build-inputs-only --no-daemon

      # ── Show Gradle errors on failure ─────────────────────────────────────────
      - name: Show Gradle error output
        if: failure()
        run: |
          echo "=== LAST 150 LINES OF BUILD LOG ==="
          tail -150 /tmp/flutter-build.log || true
          echo "=== GRADLE DAEMON LOGS ==="
          find ~/.gradle/daemon -name "*.log" 2>/dev/null \
            | sort -t/ -k1 | tail -2 | xargs tail -100 2>/dev/null || true

      # ── Upload artifact ───────────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: wyle-release-apk
          path: build/app/outputs/**/*.apk
          retention-days: 30
