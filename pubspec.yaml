name: wyle_cos
description: "Wyle - Your AI Digital Chief of Staff"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # HTTP & API
  dio: ^5.6.0
  http: ^1.2.2

  # Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^10.0.0

  # Auth
  google_sign_in: ^6.2.1

  # Media / Files
  image_picker: ^1.1.2
  file_picker: ^8.1.2

  # Voice / Audio
  speech_to_text: ^7.3.0
  flutter_tts: ^4.0.2

  # UI / Fonts
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.5
  flutter_dotenv: ^5.2.1

  # Icons
  cupertino_icons: ^1.0.8
  material_symbols_icons: ^4.2799.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/avatars/buddy_male.png
    - assets/avatars/buddy_female.png
