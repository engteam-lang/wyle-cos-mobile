name: wyle_cos
description: "Wyle - Your AI Digital Chief of Staff"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # HTTP & API
  dio: ^5.6.0
  http: ^1.2.2

  # Storage
  shared_preferences: ^2.3.2
  flutter_secure_storage: ^10.0.0

  # Auth
  google_sign_in: ^6.2.1

  # Media / Files
  image_picker: ^1.1.2
  file_picker: ^8.1.2

  # Voice / Audio
  speech_to_text: ^7.3.0
  flutter_tts: ^4.0.2
  record: ^5.0.4

  # UI / Fonts
  google_fonts: ^6.2.1

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  connectivity_plus: ^6.0.5
  flutter_dotenv: ^5.2.1
  webview_flutter: ^4.10.0

  # Icons
  cupertino_icons: ^1.0.8
  material_symbols_icons: ^4.2799.0
  app_links: ^6.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

# ── App icon generation ────────────────────────────────────────────────────────
# Run:  dart run flutter_launcher_icons
# CI runs this automatically before every APK build.
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false
  # Base image for legacy Android (< API 26) — full square icon
  image_path: "assets/logos/wyle_logo_teal.png"
  # Adaptive icon for Android 8+ (API 26+)
  # flutter_launcher_icons rasterises this PNG into mipmap-*dpi foreground
  # PNGs.  A CI step then patches mipmap-anydpi-v26/ic_launcher.xml to wrap
  # the foreground in drawable/ic_launcher_foreground.xml (<inset 15%>) so
  # the logo sits inside the safe-zone on every launcher mask shape.
  # Background: app's dark background colour
  adaptive_icon_foreground: "assets/logos/wyle_logo_teal.png"
  adaptive_icon_background: "#000D12"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/avatars/buddy_male.png
    - assets/avatars/buddy_female.png
    - assets/logos/wyle_logo_white.png
    - assets/logos/wyle_logo_teal.png
    - assets/logos/wyle_splash.png
